<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tuff-website</title>
    <style>
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Quicksand', 'Nunito', system-ui, -apple-system, sans-serif;
            text-align: center;
            background-image: url("bg/haha.png");
            background-size: cover; 
            background-position: center;
            background-attachment: fixed;
            transition: background-image 0.3s ease-in-out;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            position: relative;
            min-height: 100vh;
        }

        
        nav {
            border-radius: 20px;
            width: 100%;
            max-width: 600px;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: white;
            font-size: clamp(2rem, 5vw, 3.5rem);
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        
        .img-container {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1 / 1;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            
        }

        
        .btn-group {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 400px;
            justify-content: center;
        }

        
        .choice-btn {
            flex: 1;
            font-family: 'Quicksand', 'Nunito', system-ui, -apple-system, sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            padding: 12px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.1s ease, background-color 0.2s, box-shadow 0.2s;
        }

        .choice-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(122, 34, 207, 0.4);
            color: white;
        }

        .choice-btn:active {
            transform: scale(0.95);
        }

        .reset-btn {
            position: absolute;
            bottom: 20px;      
            right: 20px;
            flex: none;
            width: auto;
            padding: 8px 16px;
            font-size: 1rem !important;
            border-radius: 10px;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            box-shadow: 0 4px 15px 0 rgba(220, 53, 69, 0.4);
        }

        @media (max-width: 360px) {
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

    <nav>
        <h2 id="question">Am i cool?</h2>
    </nav>

    <div class="img-container">
        <img id="cat1" src="icons/soapy.jpg" alt="cat query">
    </div>

    <div class="btn-group">
        <button class="choice-btn" onclick="yes()">Yes</button>
        <button class="choice-btn" id="no_button" onclick="handleClickNo()">No</button>
        <button id="reset_button" class="choice-btn reset-btn" onclick="reset()">⟳</button>
    </div>

    <script>
        // Preload backgrounds too so they change instantly
        new Image().src = "icons/bleh.jpg";
        new Image().src = "icons/soapy.jpg";
        new Image().src = "icons/ples.jpeg";
        new Image().src = "bg/yey.png";
        new Image().src = "bg/naw.png";

        new Image().src = "icons/first.jpeg";
        new Image().src = "icons/sec.jpeg";
        new Image().src = "icons/third.jpeg";
        new Image().src = "icons/seclast.jpeg";
        new Image().src = "icons/last.jpeg";

        const question = document.getElementById("question");
        const image = document.getElementById("cat1");
        const no_button = document.getElementById("no_button");

        let padding_no = 12;
        let font_no = 24;

        function yes() {
            // Fixed paths: Added the "icons/" folder prefix so it matches your files!
            image.src = "icons/bleh.jpg";
            question.textContent = "I knew it >⩊<";
            document.body.style.backgroundImage = "url('bg/yey.png')";
            document.body.style.backgroundSize = "cover";
            document.body.style.backgroundPosition = "center";
            document.body.style.backgroundAttachment = "fixed";
        }

        const sadImages = [
            "icons/first.jpeg", // Click 1
            "icons/sec.jpeg", // Click 2
            "icons/ples.jpeg", // Click 3
            "icons/third.jpeg", // Click 4
            "icons/seclast.jpeg", // Click 5
            "icons/last.jpeg" // Click 6 (Disappear)
        ];

        const msg = [
            "Why u click No?",
            "Are u gay?",
            "i buy u ice-cream.",
            "Please! click Yes",
            "404:'No' has expired.",
            "I crying..."
        ];

        let clickCount = 0; // Tracks which click we are on

        function handleClickNo() {
            document.body.style.backgroundImage = "url('bg/naw.png')";
            document.body.style.backgroundSize = "cover";
            document.body.style.backgroundPosition = "center";
            document.body.style.backgroundAttachment = "fixed";

            
            if (clickCount < sadImages.length) {
                image.src = sadImages[clickCount];
                question.textContent = msg[clickCount];
                clickCount++; // Increase count by 1 for the next click
            }

            if (padding_no > 0) {
                padding_no = padding_no - 2;
                no_button.style.padding = padding_no + "px";
            }

            if (font_no > 0) {
                font_no = font_no - 4;
                no_button.style.fontSize = font_no + "px";
            }

            if (font_no <= 0) {
                no_button.style.display = "none";
            }
        }

        function reset() {
            question.textContent = "Am i cool?";
            image.src = "icons/soapy.jpg";

            document.body.style.backgroundImage = "url('bg/haha.png')";
            document.body.style.backgroundSize = "cover";
            document.body.style.backgroundPosition = "center";
            document.body.style.backgroundAttachment = "fixed";

            
            clickCount = 0; // Reset the click counter back to 0!
            

            padding_no = 12;
            font_no = 24;

            no_button.style.display = "inline-block";
            no_button.style.padding = padding_no + "px";
            no_button.style.fontSize = font_no + "px";
        }
    </script>

</body>
</html>
